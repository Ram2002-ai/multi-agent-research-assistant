services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://research:${POSTGRES_PASSWORD:-research}@postgres:5432/research
      AUTH_REQUIRED: ${AUTH_REQUIRED:-false}
    volumes:
      - reports:/app/outputs
      - logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: research
      POSTGRES_USER: research
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-research}
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U research -d research"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.11.3
    profiles: ["qdrant"]
    ports:
      - "6333:6333"
    volumes:
      - qdrant:/qdrant/storage

volumes:
  postgres:
  reports:
  logs:
  qdrant:
