services:
  - type: web
    name: multi-agent-research-assistant
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: researchos-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: AUTH_REQUIRED
        value: false
      - key: DEFAULT_LLM
        value: openrouter/meta-llama/llama-3.3-70b-instruct
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false

databases:
  - name: researchos-postgres
    plan: free
    region: singapore
    databaseName: researchos
    user: researchos
    ipAllowList: []
